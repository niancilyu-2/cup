# ABOUTME: Polls ESPN frequently during live match windows and syncs results to Supabase.
# ABOUTME: Manual runs via workflow_dispatch (optionally with --dry-run by editing the step).
name: Sync results

# Dormant until kickoff: only fires during the tournament window (UTC dates).
# June 11-30 and July 1-20 UTC, 2026. workflow_dispatch stays available for manual runs.
# Off-peak minutes on purpose: GitHub heavily throttles scheduled runs at
# :00/:30. Live windows use a ~5 min cadence; off-window manual runs remain available.
on:
  schedule:
    # Day/evening match windows in UTC.
    - cron: '2-59/5 15-23 11-30 6 *'
    - cron: '2-59/5 15-23 1-19 7 *'
    # Overnight UTC windows catch late North America evening games.
    - cron: '2-59/5 0-5 12-30 6 *'
    - cron: '2-59/5 0-5 1-20 7 *'
  workflow_dispatch:

# Avoid overlapping runs if one is slow.
concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/sync-espn.js
